# Aeon configuration
#
# Enable skills by setting enabled: true. Multiple skills at the same time run in parallel.
# Set var: "value" to pass a default parameter to the skill.
# Set model: "kimi-k2.5" per skill to use MiniMax via Bankr gateway.

skills:
  # --- Morning aggregation (7 AM UTC) ---
  morning-brief: { enabled: false, schedule: "0 7 * * *" }
  daily-routine: { enabled: false, schedule: "0 7 * * *" }
  rss-digest: { enabled: false, schedule: "0 7 * * *" }
  hacker-news-digest: { enabled: false, schedule: "0 7 * * *" } # top HN stories filtered by MEMORY.md interests
  paper-digest: { enabled: false, schedule: "0 7 * * *" }

  reddit-digest: { enabled: false, schedule: "0 7 * * *" }
  telegram-digest: { enabled: false, schedule: "30 7 * * *", model: "claude-sonnet-4-6" } # digest from tracked Telegram channels

  # --- Cat Content Automation ---
  cat-video: { enabled: false, schedule: "0 9,12,18 * * *", model: "kimi-k2.5" }  # Generate cat videos 3x daily
  morning-cat-report: { enabled: false, schedule: "0 8 * * *", model: "kimi-k2.5" }  # Daily cat content stats
  cat-trend-research: { enabled: false, schedule: "0 6 * * *", model: "kimi-k2.5" }  # Research trending cat topics

  # --- Mid-morning (9 AM UTC) ---
  issue-triage: { enabled: false, schedule: "0 9 * * *" }
  pr-review: { enabled: false, schedule: "0 9 * * *" }
  auto-merge: { enabled: false, schedule: "0 14 * * *" } # merge green PRs daily at 2 PM UTC; max 3 per run
  github-monitor: { enabled: false, schedule: "0 9 * * *" }
  github-issues: { enabled: false, schedule: "0 9 * * *" }
  github-trending: { enabled: false, schedule: "0 9 * * *" }
  github-releases: { enabled: false, schedule: "30 9 * * *" } # track new releases from watched repos

  # --- Midday (12 PM UTC) ---
  token-alert: { enabled: false, schedule: "0 12 * * *" }
  token-movers: { enabled: false, schedule: "0 12 * * *" }
  on-chain-monitor: { enabled: false, schedule: "0 12 * * *" }
  defi-monitor: { enabled: false, schedule: "0 12 * * *" }
  treasury-info: { enabled: false, schedule: "0 12 * * *" }
  distribute-tokens: { enabled: false, schedule: "workflow_dispatch", var: "" } # on-demand — var: distribution list label
  defi-overview: { enabled: false, schedule: "0 12 * * *" }

  monitor-polymarket: { enabled: false, schedule: "30 12 * * *", model: "claude-sonnet-4-6" } # monitor specific markets for 24h price moves and volume changes
  monitor-kalshi: { enabled: false, schedule: "0 13 * * *", model: "claude-sonnet-4-6" } # monitor Kalshi prediction markets for 24h price moves and volume
  monitor-runners: { enabled: false, schedule: "0 12 * * *" }
  token-pick: { enabled: false, schedule: "0 12 * * *" }
  token-report: { enabled: false, schedule: "30 12 * * *", model: "claude-sonnet-4-6" } # daily token price/volume from GeckoTerminal
  market-context-refresh: { enabled: false, schedule: "0 13 * * *", model: "claude-sonnet-4-6" } # fetch live crypto macro data, update memory
  narrative-tracker: { enabled: false, schedule: "30 13 * * *" } # track rising/peaking/fading narratives
  polymarket-comments: { enabled: false, schedule: "0 13 * * *" } # top comments from trending Polymarket markets
  unlock-monitor: { enabled: false, schedule: "0 10 * * 1" } # weekly token unlock/vesting tracker

  # --- Afternoon (2 PM UTC) ---
  article: { enabled: false, schedule: "0 14 * * *" }
  technical-explainer: { enabled: false, schedule: "30 14 * * *" } # visual technical explanation with AI-generated hero image
  digest: { enabled: false, schedule: "0 14 * * *" }
  research-brief: { enabled: false, schedule: "0 14 * * *" }
  deep-research: { enabled: false, schedule: "workflow_dispatch", var: "" } # on-demand only — set var to research topic
  last30: { enabled: false, schedule: "workflow_dispatch", var: "" } # on-demand — cross-platform 30-day social research
  paper-pick: { enabled: false, schedule: "0 14 * * *" }
  search-skill: { enabled: false, schedule: "0 14 * * *" }

  security-digest: { enabled: false, schedule: "0 14 * * *" }
  idea-capture: { enabled: false, schedule: "0 14 * * *" }
  deal-flow: { enabled: false, schedule: "0 14 * * 1" } # weekly funding round tracker
  reg-monitor: { enabled: false, schedule: "0 14 * * 3" } # regulatory developments tracker

  # --- Repo intelligence (3 PM UTC) ---
  push-recap: { enabled: false, schedule: "0 15 * * *" }
  repo-article: { enabled: false, schedule: "0 15 * * *" }
  repo-actions: { enabled: false, schedule: "0 15 * * *" }
  repo-pulse: { enabled: false, schedule: "0 15 * * *" }
  project-lens: { enabled: false, schedule: "30 15 * * 1,3,5" } # articles through rotating analytical lenses
  repo-scanner: { enabled: false, schedule: "0 15 * * 0", model: "claude-sonnet-4-6", var: "" } # catalog all GitHub repos — set var to username

  # --- Late afternoon (4 PM UTC) ---
  skill-security-scan: { enabled: false, schedule: "0 16 * * 1" }
  code-health: { enabled: false, schedule: "0 16 * * *" }
  changelog: { enabled: false, schedule: "0 16 * * *" }
  external-feature: { enabled: false, schedule: "30 16 * * *", var: "" } # proactively enhance watched repos — set var to owner/repo or owner/repo#N
  vuln-scanner: { enabled: false, schedule: "0 16 * * 6", var: "" } # Saturday — audit repos for security vulns, PR fixes
  deploy-prototype: { enabled: false, schedule: "workflow_dispatch", var: "" } # on-demand — build app and deploy to Vercel
  autoresearch: { enabled: false, schedule: "workflow_dispatch", var: "" } # on-demand — set var to skill name to evolve
  create-skill: { enabled: false, schedule: "workflow_dispatch", var: "" } # one-shot skill creator — set var to a description prompt

  # --- X / social (5 PM UTC) ---
  fetch-tweets: { enabled: false, schedule: "0 17 * * *" }
  refresh-x: { enabled: false, schedule: "0 17 * * *" }
  list-digest: { enabled: false, schedule: "0 17 * * *" }
  write-tweet: { enabled: false, schedule: "0 17 * * *" }
  reply-maker: { enabled: false, schedule: "0 17 * * *" }
  remix-tweets: { enabled: false, schedule: "30 17 * * *" } # 10 rephrased versions of random past tweets
  tweet-roundup: { enabled: false, schedule: "0 17 * * *", var: "" } # latest tweets on configurable topics
  agent-buzz: { enabled: false, schedule: "30 17 * * *" } # top AI agent tweets by influence
  farcaster-digest: { enabled: false, schedule: "0 17 * * *" } # trending Farcaster casts
  vibecoding-digest: { enabled: false, schedule: "30 17 * * *" } # r/vibecoding trending posts
  channel-recap: { enabled: false, schedule: "0 17 * * 0", var: "" } # weekly — recap from Telegram channel (set var to channel username)

  # --- Feed generation (5:30 PM UTC, after content skills) ---
  rss-feed: { enabled: false, schedule: "30 17 * * *" }

  # --- Gallery update (Sunday 6 PM UTC, after content week) ---
  update-gallery: { enabled: false, schedule: "0 18 * * 0" }

  # --- Content distribution (runs 30 min after article-generating skills) ---
  syndicate-article: { enabled: false, schedule: "30 15 * * *", model: "claude-sonnet-4-6", var: "" } # cross-post latest article to Dev.to

  # --- Evening / meta (6 PM UTC) ---
  goal-tracker: { enabled: false, schedule: "0 18 * * *" }
  skill-health: { enabled: false, schedule: "0 18 * * *" }

  self-improve: { enabled: false, schedule: "0 18 1/2 * *" } # every other day — improve agent skills/prompts/config
  reflect: { enabled: false, schedule: "0 18 * * *" }

  action-converter: { enabled: false, schedule: "0 18 * * *" }
  startup-idea: { enabled: false, schedule: "0 18 * * *" }
  tool-builder: { enabled: false, schedule: "reactive", var: "" } # reactive — build automation scripts from recurring tasks
  skill-repair: { enabled: false, schedule: "reactive", var: "" } # reactive — auto-fix failing skills
  evening-recap: { enabled: false, schedule: "0 21 * * *", model: "claude-sonnet-4-6" } # end-of-day ops summary
  vercel-projects: { enabled: false, schedule: "0 18 * * 0", model: "claude-sonnet-4-6", var: "" } # Sunday — catalog Vercel projects

  # --- Cost tracking (Monday 7 AM UTC, weekly) ---
  cost-report: { enabled: false, schedule: "0 7 * * 1", model: "claude-sonnet-4-6" } # weekly API cost breakdown by skill and model

  # --- Weekly (Monday only) ---
  fork-fleet: { enabled: false, schedule: "0 10 * * 1" } # fork fleet scan — inventory active forks, detect diverged work
  skill-evals: { enabled: false, schedule: "0 6 * * 0", model: "claude-sonnet-4-6" } # Sunday 6 AM UTC — output quality assertions across all tracked skills
  skill-update-check: { enabled: false, schedule: "0 19 * * 0", model: "claude-sonnet-4-6" } # Sunday 7 PM UTC — check imported skills for upstream changes and security regressions
  spawn-instance: { enabled: false, schedule: "workflow_dispatch", var: "" } # on-demand — var: "name: purpose"
  fleet-control: { enabled: false, schedule: "0 9,15 * * *" } # fleet health checks twice daily, dispatch via var
  weekly-review: { enabled: false, schedule: "0 19 * * 1" }
  weekly-shiplog: { enabled: false, schedule: "0 9 * * 1" } # Monday — narrative of everything shipped last week
  skill-leaderboard: { enabled: false, schedule: "0 17 * * 0", model: "claude-sonnet-4-6" } # Sunday — rank popular skills across forks
  workflow-security-audit: { enabled: false, schedule: "0 16 * * 0" } # Sunday — scan workflows for injection vectors
  skill-graph: { enabled: false, schedule: "0 17 * * 0" } # Sunday — regenerate skill dependency map

  # --- Utilities ---
  auto-workflow: { enabled: false, schedule: "workflow_dispatch", var: "" } # on-demand — var: URL to analyze

  # --- Fallback (must be last) ---
  heartbeat: { enabled: true, schedule: "0 8,14,20 * * *" }

# Reactive triggers — event-driven skill dispatch based on cron-state.json conditions.
# Skills with schedule: "reactive" are never cron-matched. Instead, the scheduler
# evaluates their trigger rules after processing cron skills.
#
# Format: trigger: { on: <source-skill>, when: "<condition>" }
# Conditions:
#   consecutive_failures >= N    — source skill failed N+ times in a row
#   success_rate < X             — source skill success rate below threshold
#   last_status = success        — source skill just succeeded (for chaining)
#
# Multiple triggers: trigger: [{ on: a, when: "..." }, { on: b, when: "..." }]
# Any matching trigger fires the skill (OR logic).
reactive:
  # skill-repair:
  #   trigger:
  #     - { on: "*", when: "consecutive_failures >= 3" }
  # autoresearch:
  #   trigger:
  #     - { on: skill-health, when: "last_status = success" }

# Chains — multi-step skill pipelines with parallel execution and output passing.
# Steps run sequentially; use parallel: [...] for concurrent execution within a step.
# Skills with consume: [...] receive prior step outputs injected into their context.
#
# Format:
#   chains:
#     chain-name:
#       schedule: "cron expression"
#       on_error: fail-fast          # fail-fast (default) | continue
#       steps:
#         - parallel: [skill-a, skill-b]
#         - skill: skill-c, consume: [skill-a, skill-b]
chains:
  # daily-routine:
  #   schedule: "0 7 * * *"
  #   on_error: fail-fast
  #   steps:
  #     - parallel: [token-movers, paper-pick, github-issues, hacker-news-digest]
  #     - skill: daily-routine, consume: [token-movers, paper-pick, github-issues, hacker-news-digest]

# Default model for all skills. Override per-run via workflow_dispatch.
# Options: claude-opus-4-7, claude-sonnet-4-6, claude-haiku-4-5-20251001
# Bankr gateway also supports: gemini-3-pro, gemini-3-flash, gpt-5.2, kimi-k2.5, qwen3-coder
model: kimi-k2.5

# AI Gateway — route Claude Code requests through an LLM gateway.
# provider: direct (default, uses ANTHROPIC_API_KEY) | bankr (uses BANKR_LLM_KEY)
# Bankr docs: https://docs.bankr.bot/llm-gateway/overview
gateway:
  provider: bankr

# Output channels
channels:
  jsonrender:
    enabled: true # Set to true (or JSONRENDER_ENABLED=true as repo var) to write json-render specs

# Messaging integration
# Polls for messages every 5 minutes on Telegram/Discord/Slack.
telegram:
  enabled: true
